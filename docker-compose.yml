services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SESSION_TIMEOUT: 6000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | curl -s telnet://localhost:2181 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ZOOKEEPER_SESSION_TIMEOUT_MS: 6000
      KAFKA_ZOOKEEPER_CONNECTION_TIMEOUT_MS: 10000
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  # External verification agency mock (simulates Bank Negara, SSM, etc.)
  mock-external-api:
    image: node:18-alpine
    container_name: mock-external-api
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    working_dir: /app
    command: >
      sh -c "npm install && node mock-server.js"
    ports:
      - "3001:3001"
    volumes:
      - ./mock-api:/app
      - ../uploads:/app/uploads
    environment:
      PORT: 3001
      KAFKA_BROKER: kafka:29092
      REQUEST_TOPIC: verification.requests.topic
      RESPONSE_TOPIC: verification.responses.topic
      COMPLIANCE_REQUEST_TOPIC: compliance.requests.topic
      COMPLIANCE_RESPONSE_TOPIC: compliance.responses.topic
