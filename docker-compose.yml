services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # External verification agency mock (simulates Bank Negara, SSM, etc.)
  mock-external-api:
    image: node:18-alpine
    container_name: mock-external-api
    depends_on:
      - kafka
    working_dir: /app
    command: >
      sh -c "npm install && node mock-server.js"
    volumes:
      - ./mock-api:/app
    environment:
      KAFKA_BROKER: kafka:29092
      REQUEST_TOPIC: verification.requests.topic
      RESPONSE_TOPIC: verification.responses.topic
