# Database configuration for MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/merchant-onboarding?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# SQL initialization - NEVER runs data.sql (data persists between restarts)
# To reset data to initial state: change to 'always' and restart ONCE, then change back to 'never'
spring.sql.init.mode=never

# Server configuration
server.port=8080

# CORS configuration
spring.web.cors.allowed-origins=http://localhost:4200
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

# JWT configuration
app.jwt.secret=mySecretKeyForJWTTokenGenerationThatIsLongEnoughAndSecure123456789
app.jwt.expiration=86400000

# File upload configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=100MB

# Logging configuration
logging.level.com.merchantonboarding=DEBUG
logging.level.org.springframework.web=DEBUG

spring.main.allow-circular-references=true

# ===== Apache Kafka Configuration =====
spring.kafka.bootstrap-servers=localhost:9092

# Producer configuration
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Consumer configuration
spring.kafka.consumer.group-id=merchant-onboarding-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.merchantonboarding.event
spring.kafka.consumer.properties.spring.json.value.default.type=com.merchantonboarding.event.VerificationResponseEvent
spring.kafka.consumer.properties.spring.json.use.type.headers=false

# Custom Kafka topic names
app.kafka.topics.verification-request=verification.requests.topic
app.kafka.topics.verification-response=verification.responses.topic
app.kafka.topics.compliance-request=compliance.requests.topic
app.kafka.topics.compliance-response=compliance.responses.topic

# Kafka resilience: app starts normally even if Kafka broker is temporarily unavailable
spring.kafka.admin.fail-fast=false
spring.kafka.producer.properties.max.block.ms=5000
spring.kafka.producer.properties.delivery.timeout.ms=10000
spring.kafka.producer.properties.request.timeout.ms=5000
spring.kafka.consumer.properties.session.timeout.ms=15000
spring.kafka.consumer.properties.heartbeat.interval.ms=3000
spring.kafka.listener.missing-topics-fatal=false